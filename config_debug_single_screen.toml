#
# Headshot Kiosk configuration
#
# Run with:
#   python3 headshot_kiosk.py --config <this_file>.toml
#

scale_preview_to_fit = true
square_output = true
countdown_seconds = 5
preview_countdown_hide_last_n_seconds = 2
preview_countdown_font_size = 260
countdown_beep_enabled = true
countdown_sound_file = "beep.wav"
shutter_sound_file = "camera_shutter.wav"
instruction_sound_file = "look_at_camera.wav"
flash_duration_ms = 150
video_update_interval_ms = 20
countdown_update_interval_ms = 100
camera_error_retry_ms = 2000
no_image_retry_ms = 2000
save_error_reset_ms = 3000
post_accept_reset_ms = 3000
uid_length = 9
debug_card_input = ";000000000=0000?"
output_dir = "headshots"
shutdown_grace_period_ms = 10000
shutdown_authorization_timeout_ms = 30000

[window]
debug_single_screen_mode = true
debug_touchscreen_geometry = "500x700+50+50"
debug_preview_geometry = "720x800+600+50"
touchscreen_geometry = "600x1024+2160+1491"
preview_geometry = "2160x3840+0+0"

[camera]
index = 0
width = 1920
height = 1080
fps = 30

[image_transform]
rotation_degrees = 0
mirror_horizontally = true

[email]
enabled = false
to_address = "recipient@example.com"
bcc_address = ""
from_address = "sender@example.com"
smtp_server = "smtp.example.com"
smtp_port = 25

[ldap]
enabled = false
server = "ldap.example.com"
port = 636
use_ssl = true
bind_dn = "uid=<ldap authorized user>,ou=People,dc=<organization>,dc=<domain type>"
password = "<ldap authorized user's password (protect this file properly)>"
search_base = "ou=People,dc=<organization>,dc=<domain type>"
id_attribute = "ritId"
attributes = ["mail", "cn", "sn", "uid", "givenName"]
debug_first_name = "Debug User"
debug_username = "debug_user"
debug_email = "debug_user@example.com"

[shutdown]
enabled = false
authorized_usernames = [""]
command = ["systemctl", "poweroff"]

#
# YOU SHOULD NOT HAVE TO CHANGE ANYTHING BEYOND THIS POINT
#

[eye_crop]
enabled = true
model_path = "face_detection_yunet_2023mar.onnx"
detection_width = 320
desired_eye_y_fraction = 0.38
min_score = 0.75
smoothing_alpha_small = 0.10
smoothing_alpha_large = 0.50
large_motion_threshold = 80.0
crop_deadband = 6

[ui]
background_color = "black"
foreground_color = "white"
font_family = "Helvetica"
message_font_size = 34
button_font_size = 24
button_width = 12
button_height = 2
button_border_width = 5
message_wraplength = 430
message_padx = 20
message_pady_top = 60
message_pady_bottom = 20
button_frame_pady = 20
button_pady = 10

[text]
control_window_title = "Headshot Controls"
preview_window_title = "Headshot Preview"
idle_message = "Present ID card\nto begin"
preview_message = "Position yourself,\nthen touch\n'Take Photo'"
camera_error_message = "Camera error\n\nPlease try again"
review_message = "Review your\nheadshot"
no_image_message = "No image captured\n\nPlease try again"
save_error_message = "Could not\nsave image"
submitted_message = "Submitted\n\nThank you!!!"
saved_message = "Saved"
take_photo_button = "Take Photo"
accept_button = "Accept"
retake_button = "Retake"
cancel_button = "Cancel"
email_subject = "Department Headshot"
email_body_intro = "Here is your new headshot photograph."
shutdown_button = "Shutdown"
shutdown_prompt_message = "Tap your ID to initiate a system shutdown"
shutdown_denied_message = "You are not authorized to shut down this kiosk"
shutdown_authorized_message = "Shutdown authorized, powering off ..."

[colors]
take_photo_button = "#008844"
accept_button = "#008844"
retake_button = "#aa6600"
cancel_button = "#884400"
flash_overlay = "white"
